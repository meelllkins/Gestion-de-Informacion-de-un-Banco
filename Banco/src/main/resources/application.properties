spring.application.name=Banco
server.port=8080

# MySQL datasource
spring.datasource.url=jdbc:mysql://localhost:3306/banco?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# MongoDB
# spring.mongodb.uri=mongodb://localhost:27017/banco

# JWT
app.jwt.secret=${JWT_SECRET:dev-secret-local-only-32chars!!!}
app.jwt.expiration=28800000