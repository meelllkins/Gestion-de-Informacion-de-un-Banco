spring.application.name=Banco
# Si tu MySQL usa un puerto diferente al 3306, ajústalo en la URL
server.port=8080


# MySQL datasource
spring.datasource.url=jdbc:mysql://localhost:3306/banco?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# Cambia spring.datasource.password=pass por tu contraseña real de MySQL.
spring.datasource.username=root
spring.datasource.password=pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
